#     api:     "N/A: 无对外 api 层"                            # 显式不需要
#     e2e:     "PENDING: 首个需求上线后补"                     # 待接实（make verify ⚠ 提醒）
#     sandbox: "PENDING: 要跑 e2e 时用 create-sandbox 接实"    # 待接实
